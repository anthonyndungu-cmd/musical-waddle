<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post - Strathmore School</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
  <nav class="navbar navbar-dark" style="background-color: #003580;">
    <div class="container">
      <a class="navbar-brand" href="index.html">Strathmore School</a>
      <div>
        <a href="index.html" class="btn btn-sm btn-outline-light me-1">Sign Up</a>
        <a href="signin.html" class="btn btn-sm btn-outline-light me-1">Sign In</a>
        <a href="contact.html" class="btn btn-sm btn-outline-light me-1">Contact</a>
        <a href="blogpost.html" class="btn btn-sm btn-outline-light">Blog Post</a>
      </div>
    </div>
  </nav>
 
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-7">
        <div class="form-container">
 
          <h2>Blog Post Form</h2>
          <p class="text-muted">Share news, events or stories from school life.</p>
 
          <form action="#" method="post">
 
            <div class="mb-3">
              <label for="title" class="form-label">Post Title</label>
              <input type="text" class="form-control" id="title" name="title">
            </div>
 
            <div class="mb-3">
              <label for="author" class="form-label">Your Name</label>
              <input type="text" class="form-control" id="author" name="author">
            </div>
 
            <div class="mb-3">
              <label for="category" class="form-label">Category</label>
              <select class="form-select" id="category" name="category" required>
                <option value="news">News</option>
                <option value="sports">Sports</option>
                <option value="events">Events</option>
                <option value="academic">Academic</option>
                <option value="clubs">Clubs & Societies</option>
              </select>
            </div>
 
            <div class="mb-3">
              <label for="content" class="form-label">Blog Content</label>
              <textarea class="form-control" id="content" name="content" rows="6"></textarea>
            </div>
 
            <button type="submit" class="btn btn-primary w-100" style="background-color: #003580; border-color: #003580;">Submit Post</button>
 
          </form>
 
        </div>
      </div>
    </div>
  </div>

 
</body>
</html>
