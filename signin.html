<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Strathmore School</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
  <nav class="navbar navbar-dark" style="background-color: #003580;">
    <div class="container">
      <a class="navbar-brand" href="index.html">Strathmore School</a>
      <div>
        <a href="index.html" class="btn btn-sm btn-outline-light me-1">Sign Up</a>
        <a href="signin.html" class="btn btn-sm btn-outline-light me-1">Sign In</a>
        <a href="contact.html" class="btn btn-sm btn-outline-light me-1">Contact</a>
        <a href="blogpost.html" class="btn btn-sm btn-outline-light">Blog Post</a>
      </div>
    </div>
  </nav>
 
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="form-container">
 
          <h2>Sign In Form</h2>
          <p>Welcome back! Please sign in to your account.</p>
 
          <form action="#" method="post">
 
            <div class="mb-3">
              <label for="email" class="form-label">School Email</label>
              <input type="email" class="form-control" id="email" name="email">
            </div>
 
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" name="password">
            </div>
            <button type="submit" class="btn btn-primary w-100" style="background-color: #003580; border-color: #003580;">Sign In</button>
 
          </form> 
        </div>
      </div>
    </div>
  </div>
</body>
</html>
