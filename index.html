<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Strathmore School</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-dark" style="background-color: #003580;">
    <div class="container">
      <a class="navbar-brand" href="index.html">Strathmore School</a>
      <div>
        <a href="index.html" class="btn btn-sm btn-outline-light me-1">Sign Up</a>
        <a href="signin.html" class="btn btn-sm btn-outline-light me-1">Sign In</a>
        <a href="contact.html" class="btn btn-sm btn-outline-light me-1">Contact</a>
        <a href="blogpost.html" class="btn btn-sm btn-outline-light">Blog Post</a>
      </div>
    </div>
  </nav>
 
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="form-container">
 
          <h2>Sign Up Form</h2>
          <p class="text-muted">Create an account to access the school portal.</p>
 
          <form action="#" method="post">
 
            <div class="mb-3">
              <label for="name" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="name" name="name">
            </div>
 
            <div class="mb-3">
              <label for="admno" class="form-label">Admission Number</label>
              <input type="text" class="form-control" id="admno" name="admno">
            </div>
 
            <div class="mb-3">
              <label for="email" class="form-label">School Email</label>
              <input type="email" class="form-control" id="email" name="email">
            </div>
 
            <div class="mb-3">
              <label for="class" class="form-label">Class / Year</label>
              <select class="form-select" id="class" name="class">
                <option value="y1">Year 1</option>
                <option value="y2">Year 2</option>
                <option value="y3">Year 3</option>
                <option value="y4">Year 4</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" name="password">
            </div>
            <button type="submit" class="btn btn-primary w-100" style="background-color: #003580; border-color: #003580;">Sign Up</button>
          </form>

        </div>
      </div>
    </div>
  </div>
 
</body>
</html>
