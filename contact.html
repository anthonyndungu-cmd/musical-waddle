<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Strathmore School</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
  <nav class="navbar navbar-dark" style="background-color: #003580;">
    <div class="container">
      <a class="navbar-brand" href="index.html">Strathmore School</a>
      <div>
        <a href="index.html" class="btn btn-sm btn-outline-light me-1">Sign Up</a>
        <a href="signin.html" class="btn btn-sm btn-outline-light me-1">Sign In</a>
        <a href="contact.html" class="btn btn-sm btn-outline-light me-1">Contact</a>
        <a href="blogpost.html" class="btn btn-sm btn-outline-light">Blog Post</a>
      </div>
    </div>
  </nav>
 
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="form-container">
 
          <h2>Contact Us</h2>
          <p class="text-muted">Have a question? Send a message to the school administration.</p>
 
          <form action="#" method="post">
 
            <div class="mb-3">
              <label for="name" class="form-label">Your Name</label>
              <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required>
            </div>
 
            <div class="mb-3">
              <label for="email" class="form-label">Your Email</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
            </div>
 
            <div class="mb-3">
              <label for="subject" class="form-label">Subject</label>
              <select class="form-select" id="subject" name="subject" required>
                <option value="">-- Select subject --</option>
                <option value="fees">Fee Enquiry</option>
                <option value="admissions">Admissions</option>
                <option value="results">Exam Results</option>
                <option value="other">Other</option>
              </select>
            </div>
 
            <div class="mb-3">
              <label for="message" class="form-label">Message</label>
              <textarea class="form-control" id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
            </div>
 
            <button type="submit" class="btn btn-primary w-100" style="background-color: #003580; border-color: #003580;">Send Message</button>
 
          </form>
 
        </div>
      </div>
    </div>
  </div>
</body>
</html>
